# Allow esbuild (vite's bundler) to run its postinstall so its native binary is
# fetched. Without this pnpm 10+ silently skips the build script and vite fails.
onlyBuiltDependencies:
  - esbuild

# Pin a single vite version across the tree. vitest 2.x bundles vite 5, while
# some plugins float to vite 6; two copies produce incompatible Plugin types in
# vitest.config.ts. One version keeps the types consistent.
overrides:
  vite: 5.4.21
