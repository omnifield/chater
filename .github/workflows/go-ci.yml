# in-repo Go CI gate — build / vet / test -race / golangci-lint / sqlc-drift.
#
# NOTE: temporary. This gate migrates to the reusable devopser go-ci
# (hooksPath + reusable workflow) once it ships — precedent: weber. Keep it lean
# and canon-shaped so the swap is a delete-and-call, not a rewrite.
#
# tools (pins; runtime deps pinned in go.mod):
#   sqlc          v1.31.1   (code generator)
#   golangci-lint v2.1.6    (lint job below)
#   goose         v3.27.2   (go.mod — used as a library, no CLI)
#   modernc.org/sqlite v1.53.0 (go.mod — pure-Go driver)
name: go-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Honour the go.mod toolchain pin instead of a hardcoded version.
          go-version-file: go.mod
          check-latest: false

      - name: Verify sqlc generation is in sync
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          sqlc generate
          git diff --exit-code -- internal/store \
            || { echo "::error::sqlc-generated code is stale — run 'sqlc generate' and commit"; exit 1; }

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # action v7 is required for golangci-lint v2. Pinned for a
          # deterministic gate; matches the v2 .golangci.yml schema.
          version: v2.1.6
          # Build from source with the setup-go toolchain (1.26 from go.mod)
          # instead of the prebuilt binary, which is built with go1.24 and
          # refuses a go.mod that targets a newer Go ("language version ...
          # lower than the targeted Go version").
          install-mode: goinstall
