# in-repo web CI gate — biome / typecheck / vitest / build for web/.
#
# NOTE: temporary, like go-ci. Migrates to the reusable devopser skeleton once a
# frontend variant ships. Separate workflow (independent toolchain + triggers)
# so the move is a clean lift.
name: web-ci

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/web-ci.yml']
  pull_request:
    paths: ['web/**', '.github/workflows/web-ci.yml']

permissions:
  contents: read

defaults:
  run:
    working-directory: web

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Biome
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
